scanner:
  exchanges: ["US"]
  min_price: 0.50
  max_price: 10.00
  max_symbols_per_run: 35
  request_delay_seconds: 1.05
  candle_resolution: "5"
  candle_lookback_minutes: 180
  min_dollar_volume: 250000
  min_relative_volume: 2.0
  min_change_percent: 1.0
  max_change_percent: 12.0
  min_score: 70
  max_alerts_per_run: 3
  cooldown_hours: 12
  news_lookback_hours: 18
  universe_refresh_hours: 24

weights:
  fresh_positive_news: 30
  relative_volume: 30
  early_momentum: 20
  near_session_high: 10
  support_reversal: 10

positive_keywords:
  - approval
  - approved
  - contract
  - partnership
  - acquisition
  - merger
  - patent
  - breakthrough
  - positive results
  - beats estimates
  - guidance raised
  - strategic agreement
  - fda
  - awarded
  - launch

negative_keywords:
  - offering
  - dilution
  - bankruptcy
  - delisting
  - investigation
  - reverse split
  - misses estimates
  - guidance cut
  - lawsuit
