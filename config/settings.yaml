scanner:
  exchanges: ["US"]
  min_price: 0.50
  max_price: 15.00
  max_symbols_per_run: 100
  request_delay_seconds: 0.80
  candle_resolution: "5"
  candle_lookback_minutes: 240
  min_dollar_volume: 100000
  min_relative_volume: 1.5
  min_change_percent: 0.5
  max_change_percent: 20.0
  min_score: 55
  max_alerts_per_run: 10
  cooldown_hours: 6
  news_lookback_hours: 24
  universe_refresh_hours: 24

weights:
  fresh_positive_news: 30
  relative_volume: 30
  early_momentum: 20
  near_session_high: 10
  support_reversal: 10

positive_keywords:
  - approval
  - approved
  - contract
  - partnership
  - acquisition
  - merger
  - patent
  - breakthrough
  - positive results
  - beats estimates
  - guidance raised
  - strategic agreement
  - fda
  - awarded
  - launch

negative_keywords:
  - offering
  - dilution
  - bankruptcy
  - delisting
  - investigation
  - reverse split
  - misses estimates
  - guidance cut
  - lawsuit
